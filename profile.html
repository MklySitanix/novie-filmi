<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Профиль — Новые фильмы</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-wrap{ max-width:900px;margin:36px auto;padding:18px; display:grid; grid-template-columns:220px 1fr; gap:20px; }
    .profile-card{ background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.05)); padding:16px;border-radius:12px; }
    .avatar-large{ width:160px;height:160px;border-radius:14px;object-fit:cover;display:block;margin:0 auto 12px; }
    .field{ display:flex; flex-direction:column; gap:6px;margin-bottom:10px; }
    .field input[type="text"], .field input[type="password"]{ padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06); background:transparent;color:var(--text-light) }
    .btn{ padding:10px 12px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent),#6c52e6);color:#fff;font-weight:700;cursor:pointer }
    .small-muted{ color:var(--muted); font-size:13px }
    .danger{ color:#ff6b6b }
    @media (max-width:760px){ .profile-wrap{ grid-template-columns:1fr; } .avatar-large{ margin:auto; } }
  </style>
</head>
<body>
  <div class="page-overlay">
    <!-- header (тот же) -->
    <header>
      <div class="hamburger" id="hamburger" aria-label="Меню" role="button" tabindex="0"><div class="bar"></div></div>
      <div class="logo-placeholder" aria-hidden="true"><a href="index.html"><img src="img/logo.png" alt="Логотип" style="height:42px;object-fit:contain"></a></div>
      <nav class="nav-cats" aria-label="Главная навигация">
        <a href="index.html">Главная</a>
        <a href="movies.html">Фильмы</a>
        <a href="serials.html">Сериалы</a>
        <a href="animation.html">Анимация</a>
        <a href="tv.html">ТВ</a>
      </nav>
      <div class="header-actions">
        <form id="searchFormProfile" class="search" action="search.html" method="get" role="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"></circle></svg>
          <input name="q" id="searchInputProfile" type="text" placeholder="Поиск" aria-label="Поиск">
        </form>
        <div id="authArea"><a id="accountBtn" class="btn-login" href="auth.html">Войти</a></div>
      </div>
    </header>

    <!-- sidebar -->
    <div class="sidebar" id="sidebar" aria-hidden="true"><h3>Меню</h3><!-- ... --></div>
    <div class="overlay-click" id="overlay"></div>

    <main>
      <div class="profile-wrap">
        <div class="profile-card" id="leftCard">
          <img id="avatarPreview" class="avatar-large" src="img/avatar-default.png" alt="Аватар">
          <div style="text-align:center">
            <strong id="profileNick">—</strong>
            <div class="small-muted" id="profileEmail">—</div>
          </div>
          <hr style="border-color:rgba(255,255,255,0.03);margin:12px 0">
          <div style="display:flex;flex-direction:column;gap:8px">
            <label class="small-muted">Загрузить аватар</label>
            <input id="avatarFile" type="file" accept="image/*">
            <button id="removeAvatar" class="btn" style="background:#333;border:1px solid rgba(255,255,255,0.04)">Удалить аватар</button>
            <button id="logoutBtn2" class="btn" style="background:#222;border:1px solid rgba(255,255,255,0.04);margin-top:8px">Выйти</button>
          </div>
        </div>

        <div>
          <div class="profile-card">
            <h3>Основная информация</h3>
            <div class="field">
              <label>Эл. почта (нельзя изменить)</label>
              <input id="emailField" type="text" readonly>
            </div>
            <div class="field">
              <label>Никнейм</label>
              <input id="nickField" type="text" placeholder="Как вас называть?">
            </div>
            <div style="display:flex;gap:8px">
              <button id="saveProfile" class="btn">Сохранить</button>
              <div id="saveMsg" class="small-muted" style="align-self:center"></div>
            </div>
          </div>

          <div class="profile-card" style="margin-top:14px">
            <h3>Смена пароля</h3>
            <div class="field">
              <label>Текущий пароль</label>
              <input id="curPass" type="password">
            </div>
            <div class="field">
              <label>Новый пароль</label>
              <input id="newPass" type="password">
            </div>
            <div class="field">
              <label>Повторите новый пароль</label>
              <input id="newPass2" type="password">
            </div>
            <div style="display:flex;gap:8px">
              <button id="changePassBtn" class="btn">Сменить пароль</button>
              <div id="passMsg" class="small-muted" style="align-self:center"></div>
            </div>
          </div>

        </div>

      </div>
    </main>

    <!-- footer -->
    <footer><!-- ... как на главной --></footer>
  </div>

  <script src="main.js"></script>
  <script>
    (function(){
      'use strict';
      // API из main.js: window._NF { getUserByEmail, saveUser, hashPassword, getCurrentEmail, initAuthUI }
      const api = window._NF;
      if(!api){ console.error('Требуется main.js с функциями профиля'); }

      const emailSpan = document.getElementById('emailField');
      const nickField = document.getElementById('nickField');
      const profileNick = document.getElementById('profileNick');
      const profileEmail = document.getElementById('profileEmail');
      const avatarPreview = document.getElementById('avatarPreview');
      const avatarFile = document.getElementById('avatarFile');
      const removeAvatar = document.getElementById('removeAvatar');
      const saveProfile = document.getElementById('saveProfile');
      const saveMsg = document.getElementById('saveMsg');
      const logoutBtn2 = document.getElementById('logoutBtn2');

      const curPass = document.getElementById('curPass');
      const newPass = document.getElementById('newPass');
      const newPass2 = document.getElementById('newPass2');
      const changePassBtn = document.getElementById('changePassBtn');
      const passMsg = document.getElementById('passMsg');

      const email = api.getCurrentEmail();
      if(!email){ location.href = 'auth.html'; return; }

      let user = api.getUserByEmail(email);
      if(!user){ location.href = 'auth.html'; return; }

      // заполнить форму
      emailSpan.value = user.email;
      nickField.value = user.nickname || '';
      profileNick.textContent = user.nickname || user.email;
      profileEmail.textContent = user.email;
      avatarPreview.src = user.avatar || 'img/avatar-default.png';

      // аватарка: загрузка -> преобразование в dataURL
      avatarFile.addEventListener('change', function(){
        const f = avatarFile.files && avatarFile.files[0];
        if(!f) return;
        if(!f.type.startsWith('image/')) { alert('Выберите изображение.'); return; }
        const reader = new FileReader();
        reader.onload = function(ev){
          avatarPreview.src = ev.target.result;
          user.avatar = ev.target.result;
          api.saveUser(user);
          api.initAuthUI(); // обновить аватар в шапке
          saveMsg.textContent = 'Аватар сохранён';
          setTimeout(()=> saveMsg.textContent = '', 2000);
        };
        reader.readAsDataURL(f);
      });

      removeAvatar.addEventListener('click', function(){
        delete user.avatar;
        api.saveUser(user);
        avatarPreview.src = 'img/avatar-default.png';
        api.initAuthUI();
        saveMsg.textContent = 'Аватар удалён';
        setTimeout(()=> saveMsg.textContent = '', 1500);
      });

      saveProfile.addEventListener('click', function(){
        user.nickname = nickField.value.trim();
        api.saveUser(user);
        profileNick.textContent = user.nickname || user.email;
        saveMsg.textContent = 'Сохранено';
        api.initAuthUI();
        setTimeout(()=> saveMsg.textContent = '', 1500);
      });

      changePassBtn.addEventListener('click', async function(){
        passMsg.textContent = '';
        const cur = curPass.value || '';
        const np = newPass.value || '';
        const np2 = newPass2.value || '';
        if(!cur || !np || !np2){ passMsg.textContent = 'Заполните все поля'; return; }
        if(np.length < 8){ passMsg.textContent = 'Новый пароль должен быть ≥8 символов'; return; }
        if(np !== np2){ passMsg.textContent = 'Новые пароли не совпадают'; return; }

        const curHash = await api.hashPassword(cur);
        if(curHash !== user.passwordHash){ passMsg.textContent = 'Текущий пароль неверный'; return; }

        const newHash = await api.hashPassword(np);
        user.passwordHash = newHash;
        api.saveUser(user);
        passMsg.textContent = 'Пароль изменён';
        curPass.value = newPass.value = newPass2.value = '';
        setTimeout(()=> passMsg.textContent = '', 2000);
      });

      logoutBtn2.addEventListener('click', function(){
        localStorage.removeItem('currentUser');
        api.initAuthUI();
        location.href = 'index.html';
      });

      // также обновим header auth area (если main.js ещё не сделал)
      api.initAuthUI();

    })();
  </script>
</body>
</html>
